<style>
  :root{ --bg:#FFFFFF; --bg-2:#F5F5F5; --card:#FFFFFF; --ink:#111111; --ink-soft:#666666; --ink-faint:#6B6B6B; --line:#EAEAEA; --line-soft:rgba(17,17,17,.08); --shadow-sm:0 1px 3px rgba(17,17,17,.06); --shadow-md:0 8px 20px rgba(17,17,17,.10); --shadow-lg:0 20px 50px rgba(17,17,17,.20); }

  body{ font-family:'Schibsted Grotesk',system-ui,sans-serif; background:var(--bg); color:var(--ink); min-height:100dvh; overscroll-behavior-y:none; overflow-x:hidden; }

  ::selection{ background:var(--ink); color:#fff; }

  .art.design{ background:radial-gradient(at 15% 20%,#FF8A65 0%,transparent 55%),radial-gradient(at 88% 12%,#C2185B 0%,transparent 50%),radial-gradient(at 50% 92%,#FFC107 0%,transparent 48%),linear-gradient(160deg,#2A1410,#120906); }
  .art.dev{ background:radial-gradient(at 18% 22%,#3E7BFF 0%,transparent 55%),radial-gradient(at 85% 78%,#00C2C2 0%,transparent 48%),linear-gradient(160deg,#0D0D10,#000); }
  .art.write{ background:radial-gradient(at 22% 18%,#FFC53D 0%,transparent 55%),radial-gradient(at 82% 82%,#D0431C 0%,transparent 48%),linear-gradient(160deg,#241A08,#100B03); }
  .art.local{ background:radial-gradient(at 20% 25%,#22D68A 0%,transparent 55%),radial-gradient(at 85% 75%,#0B5A46 0%,transparent 48%),linear-gradient(160deg,#071710,#020806); }

  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:999px; padding:14px 24px; font-weight:800; font-size:.9rem; transition:transform .15s; } .btn:active{ transform:scale(.97); }

  .top-right{ display:flex; align-items:center; gap:10px; }

  .feed-top{ display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding:2px 0 10px; } .feed-top::-webkit-scrollbar{ display:none; }

  .feed{ height:calc(100dvh - 256px - env(safe-area-inset-top) - env(safe-area-inset-bottom)); min-height:360px; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; } .feed::-webkit-scrollbar{ display:none; }
  .fcard .fart .art{ animation:ken 17s ease-in-out infinite alternate; transform-origin:60% 40%; }
  @keyframes ken{ from{ transform:scale(1.06) translate(0,0); } to{ transform:scale(1.2) translate(-2%,-2.5%); } }
  .fburst{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:6; pointer-events:none; color:#fff; } .fburst svg{ width:130px; height:130px; opacity:0; transform:scale(.3); filter:drop-shadow(0 6px 22px rgba(0,0,0,.4)); } .fburst.go svg{ animation:burst .8s cubic-bezier(.2,1.3,.4,1); }
  @keyframes burst{ 0%{opacity:0;transform:scale(.3)} 20%{opacity:.95;transform:scale(1.15)} 42%{transform:scale(.95)} 60%{opacity:.9;transform:scale(1.02)} 100%{opacity:0;transform:scale(1.1)} }
  .frail .cnt{ font-size:.66rem; font-weight:800; margin-top:0; } .frail .rc{ transition:transform .12s; } .frail button:active .rc{ transform:scale(.85); }

  .fcard .info{ position:absolute; left:18px; right:82px; bottom:22px; color:#fff; z-index:3; }

  .frail{ position:absolute; right:14px; bottom:24px; z-index:4; display:flex; flex-direction:column; gap:15px; align-items:center; }
  .frail button{ background:none; border:none; color:#fff; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:.6rem; font-weight:700; } .frail .rc{ width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,.2); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; } .frail .rc.deal{ background:#fff; color:#111; } .frail .rc.on{ background:#fff; color:#111; } .frail button svg{ width:23px; height:23px; }

  .loop-card{ border:1.6px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; box-shadow:var(--shadow-sm); } .loop-card .lk{ font-size:.66rem; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-faint); font-weight:800; margin-bottom:12px; display:flex; align-items:center; gap:6px; } .loop-card .lk svg{ width:13px; height:13px; }
  .loop-nodes{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:14px; } .loop-node{ display:flex; align-items:center; gap:7px; background:var(--bg-2); border-radius:999px; padding:5px 12px 5px 5px; } .loop-node .nm{ font-size:.78rem; font-weight:700; } .loop-arrow{ color:var(--ink-faint); }

  .modal{ background:var(--card); border-radius:18px; max-width:480px; width:100%; max-height:90dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; box-shadow:var(--shadow-lg); padding:24px; transform:translateY(14px); transition:transform .3s; } .overlay.on .modal{ transform:none; }
  .x{ float:right; width:40px; height:40px; margin:-6px -6px 0 0; border:none; background:var(--bg-2); border-radius:50%; font-size:1rem; color:var(--ink); }

  .pitch{ font-family:'Archivo',sans-serif; font-weight:700; font-size:1rem; line-height:1.4; background:var(--bg-2); border-left:3px solid var(--ink); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
  .facts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; } .fact{ background:var(--bg-2); border-radius:11px; padding:11px 13px; } .fact .fl{ font-size:.64rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); font-weight:800; } .fact .fv{ font-size:.86rem; font-weight:700; margin-top:2px; }
  .price{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border:1.6px solid var(--line); border-radius:14px; margin-bottom:6px; } .price .pv{ font-family:'Archivo',sans-serif; font-weight:800; font-size:1.5rem; } .price .pr{ font-size:.68rem; color:var(--ink-faint); font-weight:600; text-align:right; max-width:130px; line-height:1.35; }
  .cap{ text-align:center; font-size:.68rem; color:var(--ink-faint); font-weight:600; margin-top:7px; }
  .protect-list .pi{ display:flex; gap:12px; padding:13px 0; border-bottom:1px dashed var(--line-soft); } .protect-list .pi:last-child{ border:none; } .protect-list .ic{ flex:none; width:34px; height:34px; border-radius:9px; background:var(--bg-2); display:flex; align-items:center; justify-content:center; } .protect-list .ph{ font-weight:800; font-size:.9rem; } .protect-list .pb{ font-size:.82rem; color:var(--ink-soft); line-height:1.45; }

  .sec-label{ font-size:.72rem; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-faint); font-weight:800; margin:22px 0 12px; }
  .row{ display:flex; align-items:center; gap:14px; background:var(--card); border:1.6px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; cursor:pointer; } .row .thumb{ width:44px; height:44px; border-radius:10px; overflow:hidden; flex:none; } .row .thumb .art{ width:100%; height:100%; aspect-ratio:auto; border-radius:0; } .row .mi{ flex:1; } .row .mi .nm{ font-weight:700; font-size:.94rem; } .row .mi .snip{ font-size:.8rem; color:var(--ink-soft); } .row .mi .nx{ font-size:.74rem; color:var(--ink-faint); margin-top:2px; }
  .pill{ font-size:.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; padding:5px 10px; border-radius:999px; background:var(--bg-2); color:var(--ink-soft); } .pill.completed{ background:var(--ink); color:#fff; } .pill.cancelled{ background:transparent; border:1.4px dashed var(--line); color:var(--ink-faint); }
  .thread{ background:var(--bg-2); border-radius:12px; padding:14px; margin:14px 0; display:flex; flex-direction:column; gap:10px; max-height:240px; overflow-y:auto; } .bubble{ max-width:78%; padding:9px 13px; border-radius:14px; font-size:.85rem; line-height:1.4; } .bubble.sys{ align-self:center; background:transparent; color:var(--ink-faint); font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; font-weight:700; } .bubble.them{ align-self:flex-start; background:#fff; border:1.4px solid var(--line-soft); } .bubble.me{ align-self:flex-end; background:var(--ink); color:#fff; }
  .composer{ display:flex; gap:8px; margin:12px 0 2px; } .composer input{ flex:1; border:1.6px solid var(--line); border-radius:999px; padding:11px 16px; font-size:16px; outline:none; background:var(--bg-2); } .composer button{ border:none; background:var(--ink); color:#fff; font-weight:800; padding:11px 18px; border-radius:999px; }

function buildGraph(){ const from={}; Object.values(PEOPLE).forEach(u=>{ from[u.id]=[]; LISTINGS.forEach(l=>{ if(l.ownerId===u.id) return; const tagMatch=(u.wants||[]).some(t=>wantMatches(t,l)); const tappedWant=!!likes[u.id+':'+l.id]; if(tagMatch||tappedWant) from[u.id].push({to:l.ownerId,listing:l}); }); }); return from; }
function findLoops(involving,maxLen=4){ const from=buildGraph(); const cycles=[]; const seen=new Set();
  function dfs(start,node,path,vis){ if(path.length>=maxLen) return; for(const e of (from[node]||[])){ const nx=e.to; const leg={giver:nx,listing:e.listing,receiver:node}; if(nx===start&&path.length>=1){ const legs=path.concat([leg]); const sig=legs.map(l=>l.giver).sort().join('|')+'#'+legs.length; if(!seen.has(sig)){ seen.add(sig); cycles.push(legs); } continue; } if(vis.has(nx)) continue; vis.add(nx); dfs(start,nx,path.concat([leg]),vis); vis.delete(nx); } }
  Object.keys(PEOPLE).forEach(id=>dfs(id,id,[],new Set([id])));
  let out=cycles; if(involving) out=out.filter(legs=>legs.some(l=>l.giver===involving||l.receiver===involving));
  out.sort((a,b)=>a.length-b.length); return out;
}
function loopsFor(pid){ return findLoops(pid,3).filter(legs=>legs.length>=3).slice(0,4).map(legs=>legs.map(l=>({giver:personById(l.giver),gives:l.listing.title,receiver:personById(l.receiver)}))); }

let FEED=[],LOOPOWNERS=new Set(),filterCat='all';

let feedCycle=[], feedFills=0, LOOPFEED=[];
function filterFeed(){ let items=FEED.slice();
  if(filterCat==='__saved__') items=items.filter(l=>isSaved(l.id)); else if(filterCat!=='all') items=items.filter(l=>l.category===filterCat);
  const terms=parseSearch(searchQ); if(terms.length) items=items.filter(l=>{ const hay=(l.title+' '+l.category+' '+personById(l.ownerId).name+' '+(l.description||'')).toLowerCase(); return terms.some(t=>hay.includes(t)); });
  return items;
}
function loopCardHTML(item){ const c=item.chain; const others=c.filter(l=>l.giver.id!==currentPersona).map(l=>l.giver);
  const youGive=(c.find(l=>l.giver.id===currentPersona)||{}).gives||'';
  const youGet=(c.find(l=>l.receiver.id===currentPersona)||{}).gives||''; const n=others.length;
  const ring=others.map(p=>avatar(p,52)).join('<span class="larrow">→</span>')+`<span class="larrow">→</span><span class="lslot">?</span><span class="larrow">↻</span>`;
  return `<div class="loopfeed" data-loop="${item.id}">
    <div class="lbadge">${LOGO(12)} OPEN LOOP · 1 SPOT LEFT</div>
    <div class="lring">${ring}</div>

    <div class="lgg"><div class="r"><span class="k">You give</span><span class="v">${esc(youGive)}</span></div><div class="r"><span class="k">You get</span><span class="v">${esc(youGet)}</span></div></div>

}
function cardHTML(l){ if(l.__loop) return loopCardHTML(l);
  const o=personById(l.ownerId); const inLoop=LOOPOWNERS.has(l.ownerId); const liked=isLiked(l.id); const saved=isSaved(l.id);
  return `<div class="fcard" data-id="${l.id}"><div class="fart">${artHTML(l)}</div><div class="shade"></div><div class="fburst">${ICON.heartFill}</div>

      <button data-act="like"><span class="rc">${liked?ICON.heartFill:ICON.heart}</span><span class="cnt">${wantCount(l)}</span></button>

    </div>

      <div class="ftitle">${esc(l.title)}</div>${l.description?`<div class="fdesc">"${esc(l.description)}"</div>`:''}
      <div class="fsocial">${socialLine(l)}</div>
      <div class="fmeta"><span class="fcredit">${priceLabel(l)}</span><span class="ftag">${esc(l.category.split(' & ')[0])}</span><span class="ftag">${l.kind==='item'?`🏷 ${esc(l.condition)}`:esc(l.mode)}</span></div></div></div>`;
}
function drawFeed(){ const f=$('#feed'); if(!f) return; const items=filterFeed();
  if(!items.length){ f.innerHTML=`<div class="feed-empty"><div class="em">${filterCat==='__saved__'?'🔖':'🔍'}</div>${searchQ.trim()?'No matches — try fewer words':filterCat==='__saved__'?'Nothing saved yet — tap Save on any offer':'No offers here yet'}</div>`; f.onscroll=null; return; }
  feedCycle=varietyOrder(items); feedFills=0;
  LOOPFEED=(filterCat==='all'&&!searchQ.trim())?loopsFor(currentPersona).map((c,i)=>({__loop:true,id:'lf'+i,chain:c})):[];
  f.innerHTML=''; appendBatch(); appendBatch();
  f.onscroll=()=>{ if(f.scrollTop+f.clientHeight > f.scrollHeight - f.clientHeight*1.5) appendBatch(); };
}
function affinityCtx(){ const owners={}, cats={}; LISTINGS.forEach(l=>{ if(likes[currentPersona+':'+l.id]){ owners[l.ownerId]=(owners[l.ownerId]||0)+1; cats[l.category]=(cats[l.category]||0)+1; } }); return {owners,cats}; }
function appendBatch(){ const f=$('#feed'); if(!f||!feedCycle.length||feedFills>8) return;
  const {owners,cats}=affinityCtx(); const wants=me().wants||[];
  const wt=l=>{ let s=1; if(owners[l.ownerId]) s+=4+owners[l.ownerId]; s+=(cats[l.category]||0)*1.6; if(wants.some(t=>wantMatches(t,l))) s+=2.5; return s; };
  let batch=feedCycle.map(l=>({l,k:wt(l)*(0.45+Math.random())})).sort((a,b)=>b.k-a.k).map(x=>x.l);
  if(LOOPFEED.length){ const lp=LOOPFEED[feedFills%LOOPFEED.length]; batch.splice(Math.min(feedFills===0?1:2,batch.length),0,lp); }
  feedFills++;
  f.insertAdjacentHTML('beforeend', batch.map(cardHTML).join('')); wireCards();
}
function wireCards(){ document.querySelectorAll('#feed .loopfeed:not([data-w])').forEach(card=>{ card.setAttribute('data-w','1'); const item=LOOPFEED.find(x=>x.id===card.dataset.loop); if(!item) return;
  card.onclick=e=>{ if(!e.target.closest('button')) openChain(item.chain); };
  const cb=card.querySelector('[data-act="closeloop"]'); if(cb) cb.onclick=e=>{ e.stopPropagation(); openChain(item.chain); };
  const hb=card.querySelector('[data-act="loophow"]'); if(hb) hb.onclick=e=>{ e.stopPropagation(); openLoopExplainer(); }; });
  document.querySelectorAll('#feed .fcard:not([data-w])').forEach(card=>{ card.setAttribute('data-w','1'); const l=LISTINGS.find(x=>x.id===card.dataset.id); if(!l) return;
  wireTap(card.querySelector('.fart'), ()=>openDetail(l), ()=>likeCard(card,l));
  card.querySelector('.info').onclick=()=>openDetail(l);
  card.querySelectorAll('.frail button').forEach(btn=>btn.onclick=e=>{ e.stopPropagation(); const a=btn.dataset.act;
    if(a==='like') likeCard(card,l);
    else if(a==='save'){ toggleSave(l.id); refreshCard(card,l); toast(isSaved(l.id)?'Saved for later':'Removed'); }
    else if(a==='deal') openDetail(l);
  }); });
}
function likeCard(card,l){ const before=loopsFor(currentPersona).length; const now=toggleLike(l.id);
  if(now){ const b=card.querySelector('.fburst'); if(b){ b.classList.remove('go'); void b.offsetWidth; b.classList.add('go'); } }
  refreshCard(card,l);
  LOOPFEED=(filterCat==='all'&&!searchQ.trim())?loopsFor(currentPersona).map((c,i)=>({__loop:true,id:'lf'+i,chain:c})):[];
  renderWantStrip();
  if(now){ if(LOOPFEED.length>before){ toast('🔁 That completed a loop — here it is!'); drawFeed(); return; } toast('♥ Added — you\'ll see more like this'); } }
function refreshCard(card,l){ const lb=card.querySelector('[data-act="like"]'); if(lb){ lb.querySelector('.rc').innerHTML=isLiked(l.id)?ICON.heartFill:ICON.heart; lb.querySelector('.cnt').textContent=wantCount(l); }
  const sb=card.querySelector('[data-act="save"]'); if(sb){ sb.querySelector('.rc').className='rc '+(isSaved(l.id)?'on':''); sb.querySelector('.rc').innerHTML=isSaved(l.id)?ICON.bookmarkFill:ICON.bookmark; sb.querySelector('.cnt').textContent=savedCount(l); }
  const soc=card.querySelector('.fsocial'); if(soc) soc.innerHTML=socialLine(l); }

  let html=`<div class="loop-hero"><div class="lg">${LOGO(48)}</div><h2>Loops: everybody wins in a circle</h2><p>You want what someone has, but they don't want yours. Loop finds a third — or fourth — person to close the circle, so everyone gets what they need.</p><button class="btn" id="loopHow">See how a Loop works</button></div>`;

  else { html+=`<div class="empty"><div style="display:flex;justify-content:center;color:var(--ink-faint);margin-bottom:6px">${LOGO(40)}</div><div style="font-weight:800">No loops for you yet</div><div style="font-size:.84rem;margin-top:8px;line-height:1.55;max-width:310px;margin:8px auto 0">Loops appear when your <b>wants</b> and <b>offers</b> connect with other members. Add what you're looking for and post what you offer.</div><button class="btn btn-outline" id="loopEdit" style="margin-top:18px">Update what I'm looking for</button></div>`; }
  v.innerHTML=html;
  if($('#loopHow')) $('#loopHow').onclick=openLoopExplainer;
  v.querySelectorAll('.loop-card').forEach(card=>card.querySelector('.loop-open').onclick=()=>openChain(chains[card.dataset.i]));

function openLoopExplainer(){ openModal(`<button class="x" id="x">✕</button><div class="fl2" style="color:var(--ink-faint)">How a Loop works</div><h3>Everybody gets what they want — in a circle</h3><div class="ob-howto" style="margin:16px 0"><div class="row"><div class="n">1</div><div class="tx"><h4>You want something</h4><p>Say you want guitar lessons — but the teacher doesn't need what you offer.</p></div></div><div class="row"><div class="n">2</div><div class="tx"><h4>Loop finds the missing link</h4><p>The teacher wants a logo. Someone wants what you make. That closes the circle.</p></div></div><div class="row"><div class="n">3</div><div class="tx"><h4>Everyone trades at once</h4><p>Each person gives one thing and gets one thing. Nobody goes first — all confirm, then it happens together.</p></div></div></div><div class="safety">If even one person backs out, the whole loop cancels and no one is out anything. A loop can be 3, 4, or more people.</div><button class="btn btn-dark btn-block" id="ok">Got it</button>`); $('#x').onclick=closeModal; $('#ok').onclick=closeModal; }
function selChip(t){ return `<button class="ob-chip on wsel" data-t="${encodeURIComponent(t)}">${esc(t)} ✕</button>`; }
function wantsChipsHTML(sel){
  const yours=[...sel].map(selChip).join('')||`<span class="wnone">Nothing yet — add below 👇</span>`;

    <div class="wadd"><input id="wtext" placeholder="Type anything — a motorcycle, guitar lessons…"><button id="wadd" type="button">Add</button></div>

    <div class="whint">💡 You can also tap ♥ on anything in your feed — that counts as a want, and Loop shows you more like it.</div>`;
}
function wireWantsEditor(sel){
  const refresh=()=>{ const w=$('#wsel'),a=$('#warea'); if(w) w.innerHTML=[...sel].map(selChip).join('')||`<span class="wnone">Nothing yet — add below 👇</span>`; if(a) a.innerHTML=WANT_TAGS.map(t=>`<button class="ob-chip ${sel.has(t)?'on':''} warea" data-t="${esc(t)}">${t}</button>`).join(''); bind(); };
  const add=()=>{ const i=$('#wtext'); const v=(i.value||'').trim(); if(v){ sel.add(v); i.value=''; refresh(); } };
  function bind(){ document.querySelectorAll('#wsel .wsel').forEach(c=>c.onclick=()=>{ sel.delete(decodeURIComponent(c.dataset.t)); refresh(); });
    document.querySelectorAll('#warea .warea').forEach(c=>c.onclick=()=>{ const t=c.dataset.t; sel.has(t)?sel.delete(t):sel.add(t); refresh(); }); }
  bind();
  if($('#wadd')) $('#wadd').onclick=add;
  if($('#wtext')) $('#wtext').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); add(); } });
}
function renderWantStrip(){ const el=$('#wantstrip'); if(!el) return; const w=me().wants||[]; const tapped=LISTINGS.filter(l=>likes[currentPersona+':'+l.id]).length;
  if(!w.length&&!tapped){ el.innerHTML=`<button class="wprompt" id="wedit">✨ Tell Loop what you're looking for — it'll build loops for you</button>`; }
  else { const chips=w.slice(0,4).map(t=>`<span class="wchip">${esc(t)}</span>`).join(''); const more=(w.length>4?`<span class="wmore">+${w.length-4}</span>`:'')+(tapped?`<span class="wmore">♥ ${tapped}</span>`:''); el.innerHTML=`<span class="wlbl">Looking for</span>${chips}${more}<button class="wedit" id="wedit">Edit</button>`; }
  if($('#wedit')) $('#wedit').onclick=openWants;
}
function openWants(){ const sel=new Set(me().wants||[]);
  openModal(`<button class="x" id="x">✕</button><h3>What are you looking for?</h3><p class="wsub">The more you add, the more loops Loop can build for you.</p>${wantsChipsHTML(sel)}<button class="btn btn-dark btn-block" id="save" style="margin-top:14px">Save</button>`);
  $('#x').onclick=closeModal; wireWantsEditor(sel);
  $('#save').onclick=()=>{ me().wants=[...sel]; closeModal(); toast('Updated — finding your loops.'); if($('#feed')){ renderWantStrip(); drawFeed(); } };
}
let ONB=null, ONBOARDED=false;
function startOnboarding(){ if(currentPersona!=='you'||ONBOARDED) return; ONB={step:0,name:'',offer:{title:'',cat:'',price:''},wants:new Set(me().wants||[])}; renderOnb(); }

  if(ONB.name.trim()){ p.name=ONB.name.trim(); p.initials=p.name.trim().slice(0,2).toUpperCase(); }
  if(ONB.offer.title.trim()&&ONB.offer.cat){ LISTINGS.push({id:'l'+LID++,ownerId:'you',title:ONB.offer.title.trim(),category:ONB.offer.cat,mode:ONB.offer.cat==='Nashville-Local In-Person'?'In-Person':'Remote',wants:0,saved:0,description:'',priceMode:ONB.offer.price?'fixed':'offers',credit:ONB.offer.price?parseInt(ONB.offer.price):null}); }

/* ---- credit engine ---- */
function credit(uid,{dBal=0,dHeld=0,dEarned=0,dSpent=0,dCompleted=0,label,amount,held=null}){ const L=ledgers[uid]; L.balance+=dBal; L.held+=dHeld; L.earned+=dEarned; L.spent+=dSpent; if(dCompleted) personById(uid).completed+=dCompleted; if(label!==undefined) L.history.unshift({date:'Now',label,amount:amount!=null?amount:dBal,held,balAfter:L.balance}); }
function applyAccept(t){ credit(t.payerId,{dBal:-t.theirValue,dHeld:t.theirValue,label:`Escrow hold: ${t.theirGive}`,amount:0,held:t.theirValue}); if(t.myValue>0) credit(t.payeeId,{dBal:-t.myValue,dHeld:t.myValue,label:`Escrow hold: ${t.myGive}`,amount:0,held:t.myValue}); }
function applyComplete(t){ const payee=personById(t.payeeId),payer=personById(t.payerId); credit(t.payerId,{dBal:t.myValue,dHeld:-t.theirValue,dEarned:t.myValue,dSpent:t.theirValue,dCompleted:1,label:`Spent: ${t.theirGive} (from ${payee.name})`,amount:-t.theirValue}); if(t.myValue>0) credit(t.payerId,{label:`Earned: ${t.myGive} (for ${payee.name})`,amount:t.myValue}); credit(t.payeeId,{dBal:t.theirValue,dHeld:-t.myValue,dEarned:t.theirValue,dSpent:t.myValue,dCompleted:1,label:`Earned: ${t.theirGive} (for ${payer.name})`,amount:t.theirValue}); if(t.myValue>0) credit(t.payeeId,{label:`Spent: ${t.myGive} (from ${payer.name})`,amount:-t.myValue}); }
function applyRefund(t){ credit(t.payerId,{dBal:t.theirValue,dHeld:-t.theirValue,label:`Cancelled — refunded: ${t.theirGive}`,amount:t.theirValue}); if(t.myValue>0) credit(t.payeeId,{dBal:t.myValue,dHeld:-t.myValue,label:`Cancelled — refunded: ${t.myGive}`,amount:t.myValue}); }

const STAGES=['proposed','accepted','in_progress','delivered','completed'];
const STAGE_META={proposed:{label:'Proposed',hint:'Waiting for them to accept'},accepted:{label:'Accepted',hint:'Credits held — mark work started'},in_progress:{label:'In Progress',hint:'Work underway'},delivered:{label:'Delivered',hint:'Confirm to release credits'},completed:{label:'Completed',hint:'Credits settled'},cancelled:{label:'Cancelled',hint:'Held credits refunded'}};
function myThreads(){ return threads.filter(th=>th.aUser===currentPersona||th.bUser===currentPersona); }
function renderTrades(){ const v=$('#v-trades'); const list=myThreads().map(th=>{ const otherId=th.aUser===currentPersona?th.bUser:th.aUser; const t=trades.find(x=>x.id===th.tradeId); const l=LISTINGS.find(x=>x.id===th.listingId); const last=th.messages[th.messages.length-1]; return {th,other:personById(otherId),t,l,last}; });
  const active=list.filter(r=>!r.t||(r.t.status!=='completed'&&r.t.status!=='cancelled')); const done=list.filter(r=>r.t&&(r.t.status==='completed'||r.t.status==='cancelled'));
  const rowHTML=r=>{ const meta=r.t?STAGE_META[r.t.status]:{label:'Chat',hint:r.last?r.last.body.slice(0,40):'Say hello'}; const cls=r.t?(r.t.status==='completed'?'completed':r.t.status==='cancelled'?'cancelled':''):''; const thumb=r.l?`<div class="thumb">${artHTML(r.l)}</div>`:`<div class="thumb" style="background:var(--ink);display:flex;align-items:center;justify-content:center;color:#fff">↻</div>`; return `<div class="row" data-id="${r.th.id}">${thumb}<div class="mi"><div class="nm">${esc(r.other.name)}</div><div class="snip">${esc(r.l?r.l.title:'Conversation')}</div><div class="nx">${esc(meta.hint)}</div></div><span class="pill ${cls}">${meta.label}</span></div>`; };
  v.innerHTML=`<div class="sec-label">Active</div>`+(active.length?active.map(rowHTML).join(''):`<div class="empty"><div class="em">🤝</div>No active trades yet<div style="font-size:.82rem;margin-top:6px">Find something in the Feed, then <b>Deal</b> to Request or Propose.</div></div>`)+(done.length?`<div class="sec-label">History</div>`+done.map(rowHTML).join(''):'');

const REPLIES=["Good question — happy to walk through it.","For sure. Want to hop on a quick call to nail details?","Totally doable. When were you hoping to start?","Yeah — I can tailor the scope to what you need."];
function openThread(id){ const th=threads.find(x=>x.id===id); const otherId=th.aUser===currentPersona?th.bUser:th.aUser; const other=personById(otherId); const t=trades.find(x=>x.id===th.tradeId); const l=LISTINGS.find(x=>x.id===th.listingId);

  openModal(`<button class="x" id="x">✕</button><div class="who">${avatar(other,44)}<div><h3 style="margin:0">${esc(other.name)}</h3><div class="rl">${esc(other.hood)}, Nashville</div></div></div><div class="thread" id="thread">${bubbles}</div><div class="composer"><input id="mIn" placeholder="Message ${esc(other.name.split(' ')[0])}…"><button id="mSend">Send</button></div>${safety}${tradeUI}<button class="text-link" id="prot" style="margin-top:10px">🔒 How you're protected</button>`);
  $('#x').onclick=closeModal; $('#prot').onclick=openProtect;
  function redraw(){ $('#thread').innerHTML=th.messages.map(m=>`<div class="bubble ${m.who===currentPersona?'me':'them'}">${esc(m.body)}</div>`).join(''); $('#thread').scrollTop=1e6; }

  $('#mSend').onclick=send; $('#mIn').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
  if($('#adv')) $('#adv').onclick=()=>{ const i=STAGES.indexOf(t.status),next=STAGES[i+1]; t.status=next; if(next==='accepted') applyAccept(t); if(next==='completed') applyComplete(t); toast('Updated.'); openThread(id); };

  v.innerHTML=`<div class="hero"><div class="l">Available Balance</div><div class="amt">${L.balance} <span style="font-size:1.3rem">credits</span></div><div class="s">≈ $${L.balance} USD in trade value</div></div><div class="stat3"><div class="t"><div class="n">${L.held}</div><div class="lb">Held in Escrow</div></div><div class="t"><div class="n">${L.earned}</div><div class="lb">Earned</div></div><div class="t"><div class="n">${L.spent}</div><div class="lb">Spent</div></div></div><div class="histb"><h5>Transaction History</h5>${L.history.map(h=>{ const cls=h.held!=null?'held':h.amount>0?'pos':h.amount<0?'neg':''; const txt=h.held!=null?`${h.held} credits held`:h.amount===0?'—':(h.amount>0?'+':'')+h.amount+' credits'; return `<div class="hrow"><div class="hd">${h.date}</div><div class="ht">${esc(h.label)}</div><div class="ha ${cls}">${txt}</div></div>`; }).join('')}</div>`;
}
function renderProfile(){ const p=me(); const mine=LISTINGS.filter(l=>l.ownerId===currentPersona); const v=$('#v-profile');
  v.innerHTML=`<div class="pcard"><div class="art ${catKey(mine[0]?mine[0].category:'Design & Creative')}"></div><div class="b"><h2>${esc(p.name)}</h2><div class="role">${esc(p.hood)}, Nashville</div><div class="badges"><span class="bdg tier">${p.verified?'✓ Verified':'Unverified'}</span><span class="bdg">${p.rating!=null?'★ '+p.rating.toFixed(1):'🌱 New Trader'}</span><span class="bdg">${p.completed} trades</span></div></div></div><div class="sec-label" style="display:flex;justify-content:space-between;align-items:center">My Postings <button id="addPost" style="background:var(--ink);color:#fff;border:none;font-weight:800;font-size:.72rem;padding:7px 14px;border-radius:999px">+ New posting</button></div><div class="myposts">${mine.length?mine.map(l=>`<div class="tile">${artHTML(l)}<div class="foot"><div class="t">${esc(l.title)}</div><div class="c">${priceLabel(l)}</div></div></div>`).join(''):`<p style="color:var(--ink-faint);font-size:.85rem">No postings yet.</p>`}</div><button class="text-link" id="wants" style="margin-top:18px">Edit what I'm looking for</button>`;
  $('#addPost').onclick=openCreate; $('#wants').onclick=openWants;
}
function openCreate(){
  const st={kind:'service',title:'',cat:'',mode:'time',unit:'hour',rate:'',price:'',condition:'Good'};
  const cats=()=> st.kind==='item'?ITEM_CATS:CATS;
  const modes=()=> st.kind==='item'?[['fixed','🏷 Set a value'],['offers','🤝 Open to offers']]:[['time','⏱ By time'],['fixed','🏷 Set price'],['offers','🤝 Open to offers']];
  function panel(){ const s=sugg(st.cat||(st.kind==='item'?'Other goods':'Nashville-Local In-Person'));
    if(st.mode==='time'){ const r=st.rate||suggestRate(st.cat||'Nashville-Local In-Person',st.unit);
      return `<div class="fl2">Charge per…</div><div class="ob-chips" id="pUnits">${['hour','session','half-day','day'].map(u=>`<button class="ob-chip ${st.unit===u?'on':''}" data-u="${u}">per ${u}</button>`).join('')}</div>
        <div class="fl2">Credits per ${st.unit}</div><input class="pin" id="pRate" inputmode="numeric" value="${r}">
        <div class="phelp">💡 No package price to guess — just estimate time. A typical ${(st.cat||'local').split(' & ')[0].toLowerCase()} rate is about <b>${s.hr} credits/hr</b>. Change it anytime.</div>
        <div class="ppreview">${r} credits / ${st.unit}</div>`;
    }
    if(st.mode==='fixed'){ const p=st.price||s.mid;
      return `<div class="fl2">${st.kind==='item'?'Rough value (credits)':'Total credits'}</div><input class="pin" id="pPrice" inputmode="numeric" value="${p}">
        <input type="range" id="pSlide" min="${Math.round(s.lo*0.5)}" max="${Math.round(s.hi*1.4)}" value="${p}" style="width:100%;margin:12px 0 2px">
        <div class="phelp">💡 Similar ${st.kind==='item'?'things':'offers'} trade for <b>~${s.lo}–${s.hi} credits</b>. Just a starting point — people can still offer a swap.</div>`;
    }
    return `<div class="phelp" style="margin-top:2px">🤝 No number needed. Your listing shows <b>“Open to offers.”</b> People offer a service, some credits, or a swap — and you talk it out and agree together. ${st.kind==='item'?'Perfect for one-of-a-kind things.':'Ideal when scope changes every time.'}</div>`;
  }
  function render(){
    openModal(`<button class="x" id="x">✕</button><div class="fl2" style="color:var(--ink-faint)">New posting</div><h3 style="margin-bottom:12px">What are you offering?</h3>
      <div class="pmode" style="margin-bottom:14px">${[['service','🛠 A service'],['item','📦 A thing']].map(([k,lab])=>`<button class="pmodeb ${st.kind===k?'on':''}" data-k="${k}">${lab}</button>`).join('')}</div>
      <div class="fl2">What is it?</div><input class="pin" id="cT" placeholder="${st.kind==='item'?'e.g. Kawasaki Ninja 400, Standing desk':'e.g. Guitar lessons, Logo design'}" value="${esc(st.title)}">
      <div class="fl2" style="margin-top:14px">${st.kind==='item'?'Type':'Category'}</div><div class="ob-chips" id="cC">${cats().map(c=>`<button class="ob-chip ${st.cat===c.full?'on':''}" data-c="${c.full}">${c.label}</button>`).join('')}</div>
      ${st.kind==='item'?`<div class="fl2">Condition</div><div class="ob-chips" id="cond">${CONDITIONS.map(cn=>`<button class="ob-chip ${st.condition===cn?'on':''}" data-cn="${cn}">${cn}</button>`).join('')}</div>`:''}
      <div class="fl2">How do you want to price it?</div>
      <div class="pmode">${modes().map(([m,lab])=>`<button class="pmodeb ${st.mode===m?'on':''}" data-m="${m}">${lab}</button>`).join('')}</div>
      <div id="pPanel">${panel()}</div>
      <button class="btn btn-dark btn-block" id="cSave" style="margin-top:16px">Post it</button>`);
    $('#x').onclick=closeModal;
    document.querySelectorAll('.pmode .pmodeb[data-k]').forEach(b=>b.onclick=()=>{ st.kind=b.dataset.k; st.cat=''; st.mode=st.kind==='item'?'offers':'time'; st.rate=''; st.price=''; render(); });
    $('#cT').oninput=e=>st.title=e.target.value;
    document.querySelectorAll('#cC .ob-chip').forEach(c=>c.onclick=()=>{ st.cat=c.dataset.c; st.rate=''; st.price=''; render(); });
    if($('#cond')) document.querySelectorAll('#cond .ob-chip').forEach(c=>c.onclick=()=>{ st.condition=c.dataset.cn; render(); });
    document.querySelectorAll('.pmode .pmodeb[data-m]').forEach(b=>b.onclick=()=>{ st.mode=b.dataset.m; render(); });
    if($('#pUnits')) document.querySelectorAll('#pUnits .ob-chip').forEach(u=>u.onclick=()=>{ st.unit=u.dataset.u; st.rate=''; render(); });
    if($('#pRate')) $('#pRate').oninput=e=>{ st.rate=e.target.value.replace(/[^0-9]/g,''); const pv=document.querySelector('.ppreview'); if(pv) pv.textContent=`${st.rate||0} credits / ${st.unit}`; };
    if($('#pPrice')) $('#pPrice').oninput=e=>{ st.price=e.target.value.replace(/[^0-9]/g,''); if($('#pSlide')) $('#pSlide').value=st.price||0; };
    if($('#pSlide')) $('#pSlide').oninput=e=>{ st.price=e.target.value; if($('#pPrice')) $('#pPrice').value=st.price; };
    $('#cSave').onclick=save;
  }
  function save(){ if(!st.title.trim()) return toast('Name what you\'re offering.'); if(!st.cat) return toast(st.kind==='item'?'Pick a type.':'Pick a category.');
    const l={id:'l'+LID++,ownerId:currentPersona,title:st.title.trim(),category:st.cat,mode:st.kind==='item'?'In-Person':(st.cat==='Nashville-Local In-Person'?'In-Person':'Remote'),wants:0,saved:0,description:'',priceMode:st.mode};
    if(st.kind==='item'){ l.kind='item'; l.condition=st.condition; }
    if(st.mode==='time'){ l.timeUnit=st.unit; l.rate=parseInt(st.rate)||suggestRate(st.cat,st.unit); l.credit=l.rate; }
    else if(st.mode==='fixed'){ l.credit=parseInt(st.price)||sugg(st.cat).mid; }
    else { l.credit=null; }
    LISTINGS.push(l); closeModal(); toast('Posting is live!'); renderProfile();
  }
  render();
}

function pollBell(){ const n=notifs[currentPersona]||[]; $('#bellDot').classList.toggle('on',n.some(x=>!x.read)); }
$('#bell').onclick=()=>{ const n=notifs[currentPersona]||[]; openModal(`<button class="x" id="x">✕</button><h3 style="margin-bottom:12px">Notifications</h3>${n.length?n.map(x=>`<div style="padding:12px 0;border-bottom:1px dashed var(--line-soft)"><div style="font-weight:800;font-size:.9rem">${esc(x.title)}</div><div style="font-size:.82rem;color:var(--ink-soft)">${esc(x.body||'')}</div></div>`).join(''):`<div class="empty"><div class="em">🔔</div>Nothing yet</div>`}`); $('#x').onclick=closeModal; n.forEach(x=>x.read=true); pollBell(); };

renderMeChip(); switchView('home'); pollBell(); startOnboarding();
</script>
</body>
